<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Vaga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Verificação de Aptidão para Vaga</h2>
        
        <form id="formularioVaga">
            <div class="campo">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" required placeholder="Digite seu nome">
            </div>

            <div class="campo">
                <label for="idade">Idade:</label>
                <input type="number" id="idade" required placeholder="Ex: 25">
            </div>

            <div class="campo">
                <label for="altura">Altura (em metros):</label>
                <input type="number" id="altura" step="0.01" required placeholder="Ex: 1.75">
            </div>

            <button type="submit">Verificar Vaga</button>
        </form>

        <div id="resultado" class="mensagem-resultado"></div>
    </div>

    <script href="script.js" src="script.js"></script>
</body>
</html>
